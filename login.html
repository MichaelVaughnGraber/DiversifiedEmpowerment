<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Diversified Empowerment</title>
    <style>
        :root {
            --ks-blue: #003366;
            --ks-gold: #ffcc00;
            --light-bg: #f4f7f9;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: var(--text-dark);
            background-color: var(--light-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Header Section --- */
        header {
            background-color: var(--ks-blue);
            color: white;
            padding: 2.5rem 0 0 0;
            text-align: center;
            border-bottom: 8px solid var(--ks-gold); 
            position: relative;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            padding: 0 1rem;
        }

        header p {
            margin: 0.5rem 0 1.5rem 0;
            font-weight: 300;
            padding: 0 1rem;
            font-size: 1.1rem;
        }

        /* --- Navigation --- */
        nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 2rem;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links-left a {
            color: white;
            text-decoration: none;
            margin-right: 25px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .nav-links-left a:hover {
            color: var(--ks-gold);
        }

        /* --- Login Specific Styles --- */
        .main-content {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .main-content::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/AspringWokeLiberalsLogo.jpg'); 
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.10;
            z-index: -1;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--ks-blue);
        }

        .login-card h2 {
            margin-top: 0;
            color: var(--ks-blue);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            font-size: 1rem;
        }

        .login-btn {
            width: 100%;
            background-color: var(--ks-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background-color: #004d99;
        }

        .forgot-password {
            display: block;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #666;
            text-decoration: none;
        }

        .forgot-password:hover {
            color: var(--ks-blue);
            text-decoration: underline;
        }

        /* --- Footer --- */
        .footer {
            background: #f1f1f1;
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.85rem;
            color: #555;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 480px) {
            .login-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Diversified Empowerment</h1>
    <p>Targeted Case Management | Kansas KDHE & KDADS Support</p>
    
    <nav>
        <div class="nav-links-left">
            <a href="home.html">Home</a>
            <a href="resources.html">Resources</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="main-content">
    <div class="login-card">
        <h2>Affiliate Login</h2>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
            <a href="#" class="forgot-password">Forgot password? Contact Administration</a>
        </form>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2026 DiversifiedEmpowerment.org | Serving the Kansas TCM Community</p>
</footer>

</body>

</html>
