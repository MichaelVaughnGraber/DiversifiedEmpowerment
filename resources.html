<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Diversified Empowerment</title>
    <style>
        :root {
            --ks-blue: #003366;
            --ks-gold: #ffcc00;
            --light-bg: #f4f7f9;
            --text-dark: #333;
        }

        /* Ensure the body takes up the full screen height */
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-dark);
            background-color: var(--light-bg);
        }

        /* --- Header Section --- */
        header {
            background-color: var(--ks-blue);
            color: white;
            padding: 2rem 0 0 0;
            text-align: center;
            border-bottom: 8px solid var(--ks-gold); 
            position: relative;
            z-index: 100;
            flex-shrink: 0; /* Prevents header from shrinking */
        }

        header h1 { margin: 0; font-size: 2.2rem; }
        header p { margin: 0.5rem 0 1.5rem 0; font-weight: 300; }

        /* --- Top Navigation --- */
        nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 2rem;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .nav-links-left a {
            color: white;
            text-decoration: none;
            margin-right: 25px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .nav-links-right a {
            color: var(--ks-gold); 
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            border: 1px solid var(--ks-gold);
            padding: 6px 16px;
            border-radius: 4px;
        }

        /* --- Main Layout Wrapper --- */
        .wrapper {
            display: flex;
            flex: 1; /* This pushes the footer to the bottom and anchors content to header */
            overflow: hidden;
        }

        /* --- Left Sidebar (20% Width) --- */
        aside {
            width: 20%;
            background: white;
            border-right: 2px solid #ddd;
            padding: 2rem 1rem;
            box-sizing: border-box;
            z-index: 10;
        }

        aside h3 {
            color: var(--ks-blue);
            font-size: 1rem;
            border-bottom: 2px solid var(--ks-gold);
            padding-bottom: 8px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
        }

        .sidebar-menu li { margin-bottom: 12px; }

        .sidebar-menu a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.85rem;
            display: block;
            padding: 12px;
            background: #f1f4f7;
            border-radius: 4px;
            transition: 0.3s;
            line-height: 1.2;
        }

        .sidebar-menu a:hover {
            background: var(--ks-blue);
            color: white;
        }

        /* --- Right Content Area (80% Width) --- */
        main {
            width: 80%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: var(--light-bg); /* Matches background */
        }

        /* Fixed Background Logo Positioning */
        main::before {
            content: "";
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-image: url('images/AspringWokeLiberalsLogo.jpg'); 
            background-size: 70% auto; /* Controlled size so it doesn't bleed off */
            background-repeat: no-repeat;
            background-position: center 20%; /* Anchors it higher up toward the header */
            opacity: 0.3; 
            z-index: 0;
        }

        footer {
            background: #f1f1f1;
            text-align: center;
            padding: .75rem;
            font-size: 0.8rem;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }

        @media (max-width: 1024px) {
            aside { width: 30%; }
            main { width: 70%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Diversified Empowerment</h1>
    <p>Targeted Case Management | Kansas KDHE & KDADS Support</p>
    
    <nav>
        <div class="nav-links-left">
            <a href="index.">Home</a>
            <a href="resources.">Resources</a>
            <a href="contact.">Contact</a>
        </div>
        <div class="nav-links-right">
            <a href="login.html">Employee / Affiliate</a>
        </div>
    </nav>
</header>

<div class="wrapper">
    <aside>
        <h3>Customer Portals</h3>
        <ul class="sidebar-menu">
            <li><a href="https://www.dcf.ks.gov" target="_blank">DCF Main Page</a></li>
            <li><a href="https://kdads.ks.gov" target="_blank">KDADS Home Page</a></li>
            <li><a href="https://www.sncodo.org" target="_blank">Shawnee County CDDO</a></li>
            <li><a href="https://www.ssa.gov" target="_blank">Social Security (HCBS)</a></li>
        </ul>
    </aside>

    <main>
        </main>
</div>

<footer>
    <p>&copy; 2026 DiversifiedEmpowerment.org | Serving the State of Kansas</p>
</footer>

</body>

</html>
